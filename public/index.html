<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Municipality 16+ tools for civic participation."
    />
    <title>Municipality 16+</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css?v=20260714-7" />
    <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml" />
  </head>
  <body data-page="home">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Municipality 16+">
        <img id="project-logo" src="assets/img/logo.svg" alt="" />
        <strong>Municipality 16+</strong>
      </a>

      <div class="header-actions">
        <nav class="tool-nav" aria-label="Project tools">
          <a
            class="header-button participation-link"
            href="https://participationindex.eu/en"
            target="_blank"
            rel="noopener"
            data-i18n="indexNav"
          ></a>
          <a
            class="header-button header-button-primary app-link"
            href="https://app.municipality16plus.eu/?lang=en"
            target="_blank"
            rel="noopener"
            data-i18n="appNav"
          ></a>
        </nav>
        <label class="language-selector">
          <span class="sr-only" id="language-label">Language</span>
          <select id="language-switcher" aria-labelledby="language-label">
            <option value="en">English</option>
            <option value="cs">Čeština</option>
            <option value="lv">Latviešu</option>
            <option value="sl">Slovenščina</option>
          </select>
        </label>
      </div>
    </header>

    <main>
      <section class="hero home-hero">
        <div class="container hero-copy">
          <p class="eyebrow" data-i18n="heroEyebrow"></p>
          <h1 data-i18n="heroTitle"></h1>
          <p class="hero-lead" data-i18n="heroText"></p>
        </div>
      </section>

      <section class="gateway" aria-labelledby="gateway-title">
        <div class="container">
          <h2 class="sr-only" id="gateway-title" data-i18n="gatewayTitle"></h2>
          <div class="gateway-grid">
            <a
              class="gateway-card gateway-card-index participation-link"
              href="https://participationindex.eu/en"
              target="_blank"
              rel="noopener"
            >
              <div class="gateway-card-content">
                <span class="card-label" data-i18n="onlineTool"></span>
                <h2 data-i18n="participationName"></h2>
                <p data-i18n="participationText"></p>
                <span class="card-action" data-i18n="participationAction"></span>
              </div>
              <img
                class="gateway-card-image"
                src="assets/img/participation-index-card.jpg"
                alt=""
              />
            </a>

            <a class="gateway-card gateway-card-game" href="game.html">
              <div class="gateway-card-content">
                <span class="card-label" data-i18n="gameLabel"></span>
                <h2 data-i18n="gameName"></h2>
                <p data-i18n="gameText"></p>
                <span class="card-action" data-i18n="gameAction"></span>
              </div>
              <img
                class="gateway-card-image"
                src="assets/img/game-board-card.jpg"
                alt=""
              />
            </a>

            <a
              class="gateway-card gateway-card-app"
              href="game.html"
            >
              <div class="gateway-card-content">
                <span class="card-label" data-i18n="appSupportLabel">Digital game support</span>
                <h2 data-i18n="appSupportName">Playing with the app</h2>
                <p data-i18n="appSupportText">
                  Use the digital application while playing Municipo. It supports
                  the game experience and guides players through the digital
                  version of the Civic Participation Trainer.
                </p>
                <span class="card-action" data-i18n="appSupportAction">Learn how to play</span>
              </div>
              <img
                class="gateway-card-image"
                src="assets/img/play-with-app.png"
                alt="Players using the digital application during a board game"
              />
            </a>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container footer-grid">
        <section>
          <h2 data-i18n="aboutProjectTitle"></h2>
          <p data-i18n="aboutProjectText"></p>
          <a
            class="footer-link"
            href="https://youth.delna.lv/"
            target="_blank"
            rel="noopener"
            data-i18n="projectLink"
          ></a>
        </section>
        <section>
          <h2 data-i18n="partnersTitle"></h2>
          <p data-i18n="partnersText"></p>
        </section>
        <section class="funding">
          <h2 data-i18n="fundingTitle"></h2>
          <p data-i18n="fundingText"></p>
          <small data-i18n="fundingDisclaimer"></small>
        </section>
      </div>
      <div class="container logo-strip" aria-label="Project partners and funding">
        <img src="assets/img/logo_01.svg" alt="Agency for International Programs for Youth" />
        <img src="assets/img/logo_02.svg" alt="European Union" />
        <a href="https://delna.lv/" target="_blank" rel="noopener noreferrer">
          <img src="assets/img/logo_03.svg" alt="Transparency International Latvia – Delna" />
        </a>
        <a href="https://eiropaskustiba.lv/" target="_blank" rel="noopener noreferrer">
          <img src="assets/img/logo_04.svg" alt="European Movement Latvia" />
        </a>
        <a href="http://nvias.org/" target="_blank" rel="noopener noreferrer">
          <img class="logo-wide" src="assets/img/Nvias_R.svg" alt="NVIAS" />
        </a>
        <a href="https://www.pina.si/" target="_blank" rel="noopener noreferrer">
          <img src="assets/img/logo_06.svg" alt="PiNA" />
        </a>
      </div>
      <div class="container footer-bottom">Municipality 16+</div>
    </footer>

    <script src="assets/js/main.js?v=20260714-7" type="module"></script>
  </body>
</html>
