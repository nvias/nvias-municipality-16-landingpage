<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Civic Participation Trainer board game and online application."
    />
    <title>Civic Participation Trainer | Municipality 16+</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml" />
  </head>
  <body data-page="game">
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Municipality 16+">
        <img id="project-logo" src="assets/img/logo.svg" alt="" />
        <strong>Municipality 16+</strong>
      </a>

      <div class="header-actions">
        <nav class="tool-nav" aria-label="Project tools">
          <a
            class="header-button participation-link"
            href="https://participationindex.eu/en"
            target="_blank"
            rel="noopener"
            data-i18n="indexNav"
          ></a>
          <a
            class="header-button header-button-primary"
            href="https://app.municipality16plus.eu/"
            target="_blank"
            rel="noopener"
            data-i18n="appNav"
          ></a>
        </nav>
        <label class="language-selector">
          <span class="sr-only" id="language-label">Language</span>
          <select id="language-switcher" aria-labelledby="language-label">
            <option value="en">English</option>
            <option value="cs">Čeština</option>
            <option value="lv">Latviešu</option>
            <option value="sl">Slovenščina</option>
          </select>
        </label>
      </div>
    </header>

    <main>
      <section class="hero game-hero">
        <div class="container hero-copy">
          <p class="eyebrow" data-i18n="gameLabel"></p>
          <div class="game-hero-layout">
            <div>
              <h1 data-i18n="gameName"></h1>
              <p class="hero-lead" data-i18n="gameDetail"></p>
            </div>
            <img
              class="game-title-art"
              id="game-title-art"
              src="assets/img/title-municipo.svg"
              alt=""
            />
          </div>
        </div>
      </section>

      <section class="game-options">
        <div class="container option-grid">
          <article class="option-card">
            <span class="option-number">01</span>
            <h2 data-i18n="rulesTitle"></h2>
            <p data-i18n="rulesText"></p>
            <a class="button is-disabled" id="rules-link" aria-disabled="true">
              <span data-i18n="rulesUnavailable"></span>
            </a>
          </article>

          <article class="option-card option-card-featured">
            <span class="option-number">02</span>
            <h2 data-i18n="appTitle"></h2>
            <p data-i18n="appText"></p>
            <a
              class="button"
              href="https://app.municipality16plus.eu/"
              target="_blank"
              rel="noopener"
              data-i18n="appAction"
            ></a>
          </article>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container footer-grid">
        <section>
          <h2 data-i18n="aboutProjectTitle"></h2>
          <p data-i18n="aboutProjectText"></p>
          <a
            class="footer-link"
            href="https://youth.delna.lv/"
            target="_blank"
            rel="noopener"
            data-i18n="projectLink"
          ></a>
        </section>
        <section>
          <h2 data-i18n="partnersTitle"></h2>
          <p data-i18n="partnersText"></p>
        </section>
        <section class="funding">
          <h2 data-i18n="fundingTitle"></h2>
          <p data-i18n="fundingText"></p>
          <small data-i18n="fundingDisclaimer"></small>
        </section>
      </div>
      <div class="container logo-strip" aria-label="Project partners and funding">
        <img src="assets/img/logo_01.svg" alt="Agency for International Programs for Youth" />
        <img src="assets/img/logo_02.svg" alt="European Union" />
        <img src="assets/img/logo_03.svg" alt="Transparency International Latvia – Delna" />
        <img src="assets/img/logo_04.svg" alt="European Movement Latvia" />
        <img class="logo-wide" src="assets/img/Nvias_R.svg" alt="NVIAS" />
        <img src="assets/img/logo_06.svg" alt="PiNA" />
      </div>
      <div class="container footer-bottom">Municipality 16+</div>
    </footer>

    <script src="assets/js/main.js" type="module"></script>
  </body>
</html>
